<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8b4513">
<title>なぜ？なに？カメラ</title>
<style>
  :root {
    --accent: #8b4513;
    --accent2: #2a6b8f;
    --bg: #f5f1e6;
    --card: #fff;
    --text: #222;
    --muted: #666;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  body { font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; color: var(--text); }

  #cameraWrap { position: fixed; inset: 0; background: #000; }
  video { width: 100%; height: 100%; object-fit: cover; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 12px 16px; color: #fff;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    z-index: 10;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  #topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
  #topbar .sub { font-size: 11px; opacity: 0.8; }
  #bookBtn {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 13px; padding: 8px 14px; border-radius: 20px;
    cursor: pointer; backdrop-filter: blur(8px);
  }
  #bookBtn:active { transform: scale(0.95); }

  #shutterWrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 24px; display: flex; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    z-index: 10;
  }
  #shutter {
    width: 72px; height: 72px; border-radius: 50%;
    background: #fff; border: 4px solid rgba(255,255,255,0.5);
    cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    font-size: 28px;
  }
  #shutter:active { transform: scale(0.92); }
  #shutter:disabled { opacity: 0.4; cursor: wait; }

  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.2);
    transform: translateY(100%); transition: transform 0.3s ease;
    z-index: 20; max-height: 85vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .handle {
    width: 40px; height: 4px; background: #ccc; border-radius: 2px;
    margin: 10px auto; cursor: pointer;
  }
  .sheet .content { padding: 4px 20px 24px; }
  .sheet .title {
    font-size: 14px; color: var(--muted); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .sheet .title-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid #ccc; border-radius: 20px;
    padding: 4px 12px; font-size: 12px; color: var(--muted); cursor: pointer;
  }
  #result {
    font-size: 15px; line-height: 1.8; white-space: pre-wrap;
  }
  #result.loading { color: var(--muted); font-style: italic; }
  #result strong, #result b { color: var(--accent); }

  /* 教科リンク強調 */
  #result .subject-block {
    margin-top: 16px; padding: 12px 14px;
    background: #eef4f8; border-left: 4px solid var(--accent2);
    border-radius: 6px; font-size: 14px; line-height: 1.7;
  }
  #result .subject-block b { color: var(--accent2); }

  #thumbnail {
    width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
    float: right; margin-left: 12px; margin-bottom: 8px;
    border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  canvas { display: none; }

  #errorBanner {
    position: fixed; top: 0; left: 0; right: 0;
    background: #c0392b; color: #fff; padding: 12px 16px;
    font-size: 13px; z-index: 30; display: none;
  }

  /* 図鑑 */
  #bookGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px; margin-top: 12px;
  }
  .book-item {
    background: var(--card); border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08); cursor: pointer; aspect-ratio: 1;
    position: relative;
  }
  .book-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .book-item .date {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff; font-size: 10px; padding: 4px 6px;
  }
  .book-empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 14px; }
</style>
</head>
<body>

<div id="errorBanner"></div>

<div id="cameraWrap">
  <video id="video" autoplay playsinline muted></video>
</div>

<div id="topbar">
  <div>
    <h1>📷 なぜ？なに？カメラ</h1>
    <div class="sub">気になるものにかざしてタップ</div>
  </div>
  <button id="bookBtn" onclick="openBook()">📚 図鑑</button>
</div>

<div id="shutterWrap">
  <button id="shutter" aria-label="撮影">📸</button>
</div>

<!-- 解説シート -->
<div id="sheet" class="sheet">
  <div class="handle" onclick="closeSheet()"></div>
  <div class="content">
    <div class="title">
      <span>🔍 でんでんの解説</span>
      <div class="title-actions">
        <button class="icon-btn" onclick="closeSheet()">閉じる</button>
      </div>
    </div>
    <img id="thumbnail" alt="" style="display:none">
    <div id="result">ここに解説が出ます</div>
  </div>
</div>

<!-- 図鑑シート -->
<div id="bookSheet" class="sheet">
  <div class="handle" onclick="closeBook()"></div>
  <div class="content">
    <div class="title">
      <span>📚 図鑑（これまで見たもの）</span>
      <div class="title-actions">
        <button class="icon-btn" onclick="clearBook()">全削除</button>
        <button class="icon-btn" onclick="closeBook()">閉じる</button>
      </div>
    </div>
    <div id="bookGrid"></div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const shutter = document.getElementById('shutter');
const sheet = document.getElementById('sheet');
const bookSheet = document.getElementById('bookSheet');
const result = document.getElementById('result');
const thumb = document.getElementById('thumbnail');
const errBanner = document.getElementById('errorBanner');
const bookGrid = document.getElementById('bookGrid');

const DB_KEY = 'zukan_v1';

function showError(msg) {
  errBanner.textContent = msg;
  errBanner.style.display = 'block';
  setTimeout(() => errBanner.style.display = 'none', 5000);
}

function openSheet() { sheet.classList.add('open'); }
function closeSheet() { sheet.classList.remove('open'); }

// --- テキスト→HTML（マークダウン簡易 + 教科リンク装飾）---
function renderText(text) {
  let t = (text || '').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // 📚 教科リンク以降を装飾ブロックに
  const idx = t.indexOf('📚');
  if (idx >= 0) {
    const head = t.slice(0, idx);
    const tail = t.slice(idx);
    t = head + '<div class="subject-block">' + tail + '</div>';
  }
  return t;
}

// --- 図鑑（localStorage） ---
function loadBook() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); }
  catch { return []; }
}
function saveBook(items) {
  try { localStorage.setItem(DB_KEY, JSON.stringify(items)); }
  catch (e) {
    // 容量超過 → 古いのから削って再挑戦
    while (items.length > 10) {
      items.pop();
      try { localStorage.setItem(DB_KEY, JSON.stringify(items)); return; }
      catch {}
    }
    showError('図鑑の保存に失敗（容量超過）');
  }
}
function addToBook(image, text) {
  const items = loadBook();
  items.unshift({ id: Date.now(), image, text, date: new Date().toISOString() });
  while (items.length > 100) items.pop();
  saveBook(items);
}
function openBook() { renderBook(); bookSheet.classList.add('open'); }
function closeBook() { bookSheet.classList.remove('open'); }
function clearBook() {
  if (!confirm('図鑑を全て消去する？')) return;
  saveBook([]); renderBook();
}
function renderBook() {
  const items = loadBook();
  if (items.length === 0) {
    bookGrid.innerHTML = '<div class="book-empty">まだ何も見てないよ。<br>カメラで撮ってみよう📸</div>';
    return;
  }
  bookGrid.innerHTML = items.map(it => {
    const d = new Date(it.date);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="book-item" onclick="showBookItem(${it.id})">
      <img src="${it.image}" alt="">
      <div class="date">${label}</div>
    </div>`;
  }).join('');
}
function showBookItem(id) {
  const item = loadBook().find(x => x.id === id);
  if (!item) return;
  closeBook();
  thumb.src = item.image;
  thumb.style.display = 'block';
  result.className = '';
  result.innerHTML = renderText(item.text);
  openSheet();
}

// --- カメラ ---
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
  } catch (e) {
    showError('カメラ使用不可: ' + e.message);
  }
}

// サムネ生成
function makeThumb(dataUrl, size) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const scale = size / Math.max(img.width, img.height);
      c.width = img.width * scale;
      c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function capture() {
  if (!video.videoWidth) { showError('カメラ準備中'); return; }
  shutter.disabled = true;
  result.className = 'loading';
  result.textContent = '考え中...';
  thumb.style.display = 'none';
  openSheet();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
  thumb.src = dataUrl;
  thumb.style.display = 'block';

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl })
    });
    const data = await res.json();
    result.className = '';
    if (data.error) {
      result.textContent = '⚠ ' + data.error;
    } else {
      const text = data.text || '';
      result.innerHTML = renderText(text);
      const thumbSmall = await makeThumb(dataUrl, 240);
      addToBook(thumbSmall, text);
    }
  } catch (e) {
    result.className = '';
    result.textContent = '通信エラー: ' + e.message;
  } finally {
    shutter.disabled = false;
  }
}

shutter.addEventListener('click', capture);
initCamera();
</script>
</body>
</html>
